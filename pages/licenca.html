<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../css/style.css"><script src="../js/licenca.js"></script><script src="../js/util.js"></script></head>
<body>
<div class="lic-body">
  <div class="lic-box">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#25d366,#128c4a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 6px 20px rgba(37,211,102,0.4)"></div>
      <div>
        <div style="font-size:26px;font-weight:900;color:var(--fg)">Zap<span style="color:#25d366">Bot IA</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Bot IA WhatsApp — Ativacao</div>
      </div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--fg);margin-bottom:6px">Insira sua Chave de Licenca</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">
      Formato: <span style="font-family:monospace;color:var(--primary);font-weight:700">ZPBIA-XXXX-XXXX-XXXX-XXXX</span>
    </div>
    <input class="lic-input" id="inputChave" maxlength="29" placeholder="ZPBIA-XXXX-XXXX-XXXX-XXXX" oninput="fmtKey(this)" onkeydown="if(event.key==='Enter')ativar()">
    <div style="margin-top:10px;margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">WhatsApp (opcional)</div>
      <input class="lic-input" id="inputPhone" maxlength="20" placeholder="11999999999" style="margin-bottom:0">
    </div>
    <button class="lic-btn" id="btnAtivar" onclick="ativar()">Ativar Licenca</button>
    <div style="background:var(--red-bg);border:1px solid rgba(240,82,82,.25);color:var(--red);border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;margin-top:12px;display:none" id="erro"></div>
    <div style="background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.2);color:#25d366;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;margin-top:12px;display:none" id="sucesso"></div>
    <div style="text-align:center;margin-top:22px;font-size:11px;color:var(--muted)">Suporte: (11) 94898-1459 · GHZPLUGIN@GMAIL.COM</div>
  </div>
</div>
<script>
aplicarTemaAtual()

function fmtKey(inp) {
  let v = inp.value.toUpperCase().replace(/[^A-Z0-9]/g, ''), r = ''
  const parts = [5, 4, 4, 4, 4]
  let pos = 0
  for (let i = 0; i < parts.length && pos < v.length; i++) {
    if (i > 0) r += '-'
    r += v.slice(pos, pos + parts[i])
    pos += parts[i]
  }
  inp.value = r
}

function showErr(msg) {
  const el = document.getElementById('erro')
  el.textContent = msg; el.style.display = 'block'
  document.getElementById('sucesso').style.display = 'none'
  setTimeout(() => el.style.display = 'none', 6000)
}

function showOk(msg) {
  const el = document.getElementById('sucesso')
  el.textContent = msg; el.style.display = 'block'
  document.getElementById('erro').style.display = 'none'
}

async function ativar() {
  const chave = document.getElementById('inputChave').value.trim()
  const phone = document.getElementById('inputPhone').value.trim()
  if (!chave) { showErr('Digite a chave de licenca.'); return }

  const btn = document.getElementById('btnAtivar')
  btn.disabled = true; btn.textContent = 'Validando...'

  try {
    const r = await window.ghzLicense.activateOnline(chave, phone)
    if (r?.ok) {
      showOk('Licenca ativada com sucesso!')
      setTimeout(() => { window.location.replace('../index.html') }, 1200)
    } else {
      showErr(r?.message || 'Chave invalida ou expirada.')
      btn.disabled = false; btn.textContent = 'Ativar Licenca'
    }
  } catch (e) {
    showErr('Erro de conexao. Verifique sua internet e tente novamente.')
    btn.disabled = false; btn.textContent = 'Ativar Licenca'
  }
}
</script>
</body></html>
